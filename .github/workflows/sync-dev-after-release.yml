name: Sync dev after main release

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-dev:
    name: Merge main back into dev
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge released main into dev
        run: |
          git fetch origin main dev --tags

          if git merge-base --is-ancestor origin/main origin/dev; then
            echo "[OK] origin/main is already merged into origin/dev"
            exit 0
          fi

          git checkout -B dev origin/dev
          git merge -X ours --no-ff origin/main -m "chore: merge main into dev [skip ci]"
          git push origin dev
          echo "[OK] Merged origin/main into dev with dev-first conflict resolution"
