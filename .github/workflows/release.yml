name: Release

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Configure Git for semantic-release
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Validate package.json
        run: |
          echo "Validating package.json..."
          npm pkg fix
          git diff --exit-code package.json || (echo "package.json was modified by npm pkg fix" && exit 1)

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run typecheck

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun test

      - name: Build dist bundle
        run: bun run build

      - name: Build dashboard UI
        run: bun run ui:build

      - name: Verify UI build
        run: |
          if [ ! -f dist/ui/index.html ]; then
            echo "Error: UI build failed - index.html not found"
            exit 1
          fi
          echo "[OK] UI build verified: $(ls dist/ui/ | wc -l) files"

      - name: Verify packaged CLI
        run: node scripts/prepublish-check.js

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Get version before release
        id: before
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Release with semantic-release
        id: semantic
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: npx semantic-release

      - name: Check if new version was released
        id: check
        run: |
          NEW_VERSION=$(node -p "require('./package.json').version")
          if [ "$NEW_VERSION" = "${{ steps.before.outputs.version }}" ]; then
            echo "released=false" >> $GITHUB_OUTPUT
            echo "[i] No new version released (still $NEW_VERSION)"
          else
            echo "released=true" >> $GITHUB_OUTPUT
            echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
            echo "[OK] New version released: $NEW_VERSION"
          fi
          if [ "${{ steps.semantic.outcome }}" = "failure" ]; then
            echo "::warning::semantic-release exited with errors (publish may have succeeded, post-publish hooks failed)"
          fi

      - name: Notify Discord
        if: steps.check.outputs.released == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "[i] DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          node scripts/send-discord-release.cjs production

      - name: Close and label referenced issues as released
        if: steps.check.outputs.released == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find previous stable tag (skip current release)
          PREV_STABLE=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -2 | tail -1)
          if [ -z "$PREV_STABLE" ]; then
            echo "[i] No previous stable tag found, scanning last 50 commits"
            RANGE=""
          else
            RANGE="${PREV_STABLE}..HEAD"
          fi

          git log ${RANGE:---no-merges -50} --no-merges --format="%B" | \
            grep -oiP '(?:closes|fixes|resolves)\s+#\K\d+' | sort -u | \
            while read -r num; do
              gh issue close "$num" 2>/dev/null && \
                echo "[OK] Closed #${num}" || \
                echo "[i] Could not close #${num} (may already be closed)"
              gh issue edit "$num" --add-label "released" --remove-label "released on @dev" 2>/dev/null && \
                echo "[OK] Labeled #${num} as released" || \
                echo "[i] Could not update labels on #${num}"
            done
