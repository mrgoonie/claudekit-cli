name: Release Dev

on:
  push:
    branches:
      - dev
  workflow_dispatch:

concurrency:
  group: release-dev-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Release Dev
    runs-on: ubuntu-latest
    # Skip release commits to avoid infinite loop (null-safe for workflow_dispatch)
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message || '', '[skip ci]')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ensure latest stable release is merged into dev
        run: |
          git fetch origin main --tags
          LATEST_STABLE_TAG=$(git tag --merged origin/main --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1)

          if [ -z "$LATEST_STABLE_TAG" ]; then
            echo "::warning::No stable tag found on origin/main; skipping merge-base guard"
            exit 0
          fi

          LATEST_STABLE_COMMIT=$(git rev-list -n 1 "$LATEST_STABLE_TAG")

          if git merge-base --is-ancestor "$LATEST_STABLE_COMMIT" HEAD; then
            echo "[OK] Latest stable release $LATEST_STABLE_TAG is merged into dev"
            exit 0
          fi

          echo "::error::Latest stable release $LATEST_STABLE_TAG is not merged into dev. Merge origin/main into dev before releasing dev again."
          echo "[i] Stable tag commit: $LATEST_STABLE_COMMIT"
          echo "[i] Current dev head: $(git rev-parse HEAD)"
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.2

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run type check
        run: bun run typecheck

      - name: Run linter
        run: bun run lint

      - name: Run tests
        run: bun test --verbose
        env:
          NON_INTERACTIVE: "true"
          CI: "true"
          CI_SAFE_MODE: "true"

      - name: Compute dev version
        id: version
        run: |
          # Refresh tags to prevent collision with concurrent runs
          git fetch origin --tags

          # Get latest stable tag (only pure semver, exclude all prereleases)
          STABLE_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          STABLE_VERSION=${STABLE_TAG#v}

          if [ -z "$STABLE_VERSION" ]; then
            echo "No stable tag found, using 0.0.0"
            STABLE_VERSION="0.0.0"
          fi

          # Find highest existing dev number (not count — avoids collision if tags deleted)
          LAST_DEV=$(git tag -l "v${STABLE_VERSION}-dev.*" | sed 's/.*dev\.//' | sort -n | tail -1)
          NEXT_DEV=$(( ${LAST_DEV:-0} + 1 ))

          DEV_VERSION="${STABLE_VERSION}-dev.${NEXT_DEV}"
          echo "version=${DEV_VERSION}" >> "$GITHUB_OUTPUT"
          echo "stable=${STABLE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "[i] Stable: v${STABLE_VERSION} | Dev: v${DEV_VERSION}"

      - name: Update package version
        run: |
          npm version "${{ steps.version.outputs.version }}" --no-git-tag-version

      - name: Build release bundle after version bump
        run: bun run build

      - name: Build dashboard UI after version bump
        run: bun run ui:build

      - name: Verify UI build
        run: |
          if [ ! -f dist/ui/index.html ]; then
            echo "Error: UI build failed - index.html not found"
            exit 1
          fi
          echo "[OK] UI build verified: $(ls dist/ui/ | wc -l) files"

      - name: Verify packaged dev release
        run: |
          node scripts/prepublish-check.js --dev-release --expected-version="${{ steps.version.outputs.version }}"

      - name: Commit and tag
        run: |
          git add package.json
          [ -f CHANGELOG.md ] && git add CHANGELOG.md
          git commit -m "chore(release): ${{ steps.version.outputs.version }} [skip ci]"
          git tag "v${{ steps.version.outputs.version }}"
          git push origin dev
          git push origin "v${{ steps.version.outputs.version }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Publish to npm (dev tag)
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          npm publish --tag dev --registry https://registry.npmjs.org/ --//registry.npmjs.org/:_authToken="${NPM_TOKEN}"

      - name: Generate structured release notes
        id: notes
        run: |
          # Find previous tag — aligned with send-discord-release.cjs logic:
          # sort ALL v* tags by version, skip index 0 (current release), pick index 1.
          CURRENT_TAG="v${{ steps.version.outputs.version }}"
          PREV_TAG=$(git tag --sort=-v:refname -l "v*" | grep -v "^${CURRENT_TAG}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            echo "[i] No previous tag found, using last 20 commits"
            RANGE=""
          else
            RANGE="${PREV_TAG}..HEAD"
          fi

          # Generate structured notes from conventional commits
          NOTES_FILE=$(mktemp)
          declare -A SECTIONS
          SECTION_ORDER="feat hotfix fix perf refactor docs test build ci chore"

          GIT_CMD="git log --no-merges --format=%h %s"
          if [ -n "$RANGE" ]; then
            GIT_CMD="git log ${RANGE} --no-merges --format=%h %s"
          else
            GIT_CMD="git log -20 --no-merges --format=%h %s"
          fi

          while IFS= read -r line; do
            [[ -z "$line" || "$line" == *"[skip ci]"* ]] && continue
            if [[ "$line" =~ ^([a-f0-9]+)\ ([a-zA-Z]+)(\(([^)]*)\))?!?:\ (.+) ]]; then
              hash="${BASH_REMATCH[1]}"
              type="${BASH_REMATCH[2],,}"
              scope="${BASH_REMATCH[4]}"
              desc="${BASH_REMATCH[5]}"
              entry="* ${desc} (${hash})"
              [[ -n "$scope" ]] && entry="* **${scope}:** ${desc} (${hash})"
              SECTIONS[$type]+="${entry}"$'\n'
            fi
          done < <($GIT_CMD 2>/dev/null)

          # Map types to section headers (matching .releaserc.js)
          declare -A HEADERS=(
            [feat]="🚀 Features"
            [hotfix]="🔥 Hotfixes"
            [fix]="🐞 Bug Fixes"
            [perf]="⚡ Performance Improvements"
            [refactor]="♻️ Code Refactoring"
            [docs]="📚 Documentation"
            [test]="✅ Tests"
            [build]="🏗️ Build System"
            [ci]="👷 CI"
            [chore]="🔧 Chores"
          )

          for type in $SECTION_ORDER; do
            if [[ -n "${SECTIONS[$type]}" ]]; then
              echo "### ${HEADERS[$type]}" >> "$NOTES_FILE"
              echo "" >> "$NOTES_FILE"
              printf '%s' "${SECTIONS[$type]}" >> "$NOTES_FILE"
              echo "" >> "$NOTES_FILE"
            fi
          done

          # Fallback if no conventional commits found
          if [ ! -s "$NOTES_FILE" ]; then
            echo "No conventional commits found in this release." > "$NOTES_FILE"
          fi

          echo "file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub prerelease
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --prerelease \
            --notes-file "${{ steps.notes.outputs.file }}" \
            --target dev
          rm -f "${{ steps.notes.outputs.file }}"

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "[i] DISCORD_WEBHOOK_URL not set, skipping"
            exit 0
          fi
          node scripts/send-discord-release.cjs dev
